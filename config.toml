baseURL = 'https://cwhsueh.com/'
languageCode = 'zh-TW'
title = 'cwHsueh'
theme = 'hugo-theme-stack'
googleAnalytics = "G-8MRV1Z256B"

[menu]
  [[menu.main]]
    name = 'Leetcode Menu'
    url = '/leetcode/menu'
    weight = 15
  [[menu.main]]
    name = 'Home'
    url = '/'
    weight = 10

[params]
  mainSections = ["post"]

  [[params.widgets.page]]
    type = 'toc'
    
  [params.widgets]
    enabled = ['search']
  
  [params.article]
    readingTime = false

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    noHl = false
    style = 'monokai'
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = true